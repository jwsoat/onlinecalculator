server {
    listen 80;
    server_name onlinecalculator.co.nz www.onlinecalculator.co.nz;
    root /usr/share/nginx/html;
    index index.html;

    # ads.txt — must be served as plain text from /ads.txt
    location = /ads.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # robots.txt
    location = /robots.txt {
        add_header Content-Type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # sitemap.xml
    location = /sitemap.xml {
        add_header Content-Type "application/xml";
        add_header Cache-Control "public, max-age=3600";
    }

    # Main location — clean URLs with trailing slash
    location / {
        add_header X-Robots-Tag "index, follow" always;
        try_files $uri $uri/ $uri.html =404;
    }

    # Aggressive caching for static assets (CSS, JS, fonts, images)
    location ~* \.(css|js|woff2|woff|ttf|eot|png|svg|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
